name: AIOS Desktop internal release

on:
  push:
    tags:
      - 'v*-internal.*'

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build-release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: macOS Apple Silicon unsigned app/dmg
            runner: macos-latest
            target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin --bundles app,dmg --no-sign
          - name: macOS Intel unsigned app/dmg
            runner: macos-15-intel
            target: x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin --bundles app,dmg --no-sign
          - name: Windows x64 unsigned nsis/msi
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            tauri_args: --target x86_64-pc-windows-msvc --bundles nsis,msi

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Cargo check
        run: cd src-tauri && cargo check --target "${{ matrix.target }}"

      - name: Build and upload internal prerelease assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: ${{ matrix.tauri_args }}
          tagName: ${{ github.ref_name }}
          releaseName: AIOS Desktop ${{ github.ref_name }} Internal
          releaseBody: |
            This is an unsigned internal testing build for AIOS Desktop.
            It is not a public signed release. macOS Gatekeeper, Windows SmartScreen, or enterprise policy may warn or block installation.
            Tauri updater artifacts remain disabled. Signing, notarization, stapling, code signing, and updater distribution remain deferred.
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: false
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
